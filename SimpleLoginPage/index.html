<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="/SimpleLoginPage/light.css" /> -->
    <link rel="stylesheet" href="/SimpleLoginPage/dark.css" />
    <title>Simple Login Page</title>
  </head>
  <body>
    <div class="container">
      <form class="login-box">
        <h2>Login</h2>

        <input
          type="text"
          placeholder="Username/Email"
          id="username"
          class="field"
          required
        />
        <input
          type="password"
          placeholder="Password"
          id="password"
          class="field"
          required
        />

        <a href="#" id="forgot">Forgot password?</a>

        <button type="submit" class="field">Login</button>
      </form>
    </div>
  </body>
</html>
